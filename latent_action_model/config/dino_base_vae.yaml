# VJEPA/LAM training config for Lightning CLI.
# The state-delta decoder is always present; robot samples with nonzero state
# masks contribute the auxiliary physical-grounding loss.

seed_everything: 42

  
model:
  # Vision backbone used to extract continuous patch features for LAM.
  # vision_model_id: "/mnt/xx/xx/weights/dinov3-vitl16-pretrain-lvd1689m" 
  vision_model_id: "/mnt/xx/xx/weights/dinov3-vitb16-pretrain-lvd1689m"
  # vision_model_id: "/mnt/xx/xx/weights/vjepa2-vitl-fpc64-256"
  # vision_model_id: "/mnt/xx/xx/weights/Cosmos-0.1-Tokenizer-CI16x16"
  dim: 768
  enc_layers: 12
  ffn_expansion_factor: 3
  num_heads: 12
  # Must match data.max_state_dim for mixed datasets with padded states.
  max_state_dim: 14
  num_embodiments: 32
  codebook_size: 32
  code_dim: 32
  num_queries: 1
  num_frames: 2
  image_hw: [256, 256]
  patch_size: 16
  image_aug: true
  dual_view_aug: true
  dec_layers: 6
  dropout: 0.0
  warmup_steps: 2000
  enc_add_state: false
  enc_modal_mask: true
  lambda_aux: 1.0
  loss_type: "l2"
  state_loss_type: "l2"

  latent_layer_to_use: -2
  multi_input: false
  norm_latents: true
  norm_latents_type: "ln"
  lambda_diversity: 0.0
  vq_type: "vae"
  vq_kwargs:
    layer_norm: true

  project: lam
  task_name: dino_base_vae_l2_batch64


  wandb_offline: true
  
  optimizer: 
    class_path: torch.optim.AdamW
    init_args:
      lr: 1e-4
      weight_decay: 1e-2
  exclude_bias_norm_from_wd: true
  
  make_data_pair: false
  output_dir: output_pairs

data:
  # LeRobotDataModule (latent_action_model/data_loader/lerobot_datamodule.py)
  data_root_dir: "/mnt/xx/xx/datasets"
  data_mix: "lam_plus_human"  # lam_plus_human bridge
  video_backend: "pyav"  # torchcodec is very slow on AgiBot AV1 random-access training
  num_frames: 2
  image_hw: [256, 256]
  frame_dt_sec: 1.6
  human_frame_dt_sec: 0.4
  batch_size: 64
  # Keep multi-GPU worker count conservative to avoid host-memory spikes during video decode.
  num_workers: 6
  prefetch_factor: 4
  pin_memory: false
  persistent_workers: false
  # Let fast workers return first; this reduces periodic dataloader stalls.
  in_order: false
  debug_repeat_batch: false
  max_state_dim: 14

trainer:
  max_epochs: 40
  accelerator: gpu
  devices: auto
  # strategy: ddp_find_unused_parameters_true
  strategy: ddp_find_unused_parameters_false
  accumulate_grad_batches: 1    
  precision: bf16-mixed            #bf16-mixed 32-true 
  log_every_n_steps: 1000
  gradient_clip_val: 1.0
  val_check_interval: 1.0
  num_sanity_val_steps: 0
  limit_val_batches: 1.0

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        # dirpath: ./logs/vjepa_lam
        verbose: true
        save_last: true
        save_top_k: -1
        # Save only at train epoch end to avoid DDP checkpoint broadcasts after mid-epoch validation.
        save_on_train_epoch_end: true
        every_n_epochs: 1
        # every_n_train_steps: 100
        filename: "{epoch}"
        

    - class_path: latent_action_model.core.lam_lightinng.SaveConfigToCheckpointCallback

  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: latent_action_model/logs
        name:  dino_base_vae_l2_batch64






    # - class_path: lightning.pytorch.loggers.WandbLogger
    #   init_args:
    #     project: UniVLA-latent_action_model
    #     name: lam
    #     offline: false

       

        
